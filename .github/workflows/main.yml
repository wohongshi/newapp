name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and SDK 35
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          # Remove any corrupted SDK 35
          rm -rf $ANDROID_HOME/platforms/android-35
          # Install SDK 35 fresh
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;25.2.9519653" "platforms;android-35" "build-tools;35.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          # Verify SDK 35
          ls -la $ANDROID_HOME/platforms/android-35/android.jar

      - name: Build Rust (arm64)
        working-directory: rust_backend
        run: |
          cargo ndk -t arm64-v8a --platform 21 -- build --release
          mkdir -p ../android/app/src/main/jniLibs/arm64-v8a
          cp target/aarch64-linux-android/release/libnewapp_backend.so ../android/app/src/main/jniLibs/arm64-v8a/

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: newapp-arm64
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
