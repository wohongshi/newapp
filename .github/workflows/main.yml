name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and fix SDK 35
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;25.2.9519653" "platforms;android-35" "build-tools;35.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          # Verify SDK 35 jar is valid
          if ! jar tf $ANDROID_HOME/platforms/android-35/android.jar > /dev/null 2>&1; then
            echo "SDK 35 jar is corrupted, reinstalling..."
            rm -rf $ANDROID_HOME/platforms/android-35
            $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35"
          fi

      - name: Build Rust for Android (arm64)
        working-directory: rust_backend
        run: |
          cargo ndk -t arm64-v8a --platform 21 -- build --release
          mkdir -p ../android/app/src/main/jniLibs/arm64-v8a
          cp target/aarch64-linux-android/release/libnewapp_backend.so ../android/app/src/main/jniLibs/arm64-v8a/

      - name: Build Rust for Android (armv7)
        working-directory: rust_backend
        run: |
          cargo ndk -t armeabi-v7a --platform 21 -- build --release
          mkdir -p ../android/app/src/main/jniLibs/armeabi-v7a
          cp target/armv7-linux-androideabi/release/libnewapp_backend.so ../android/app/src/main/jniLibs/armeabi-v7a/

      - name: Build Rust for Android (x86_64)
        working-directory: rust_backend
        run: |
          cargo ndk -t x86_64 --platform 21 -- build --release
          mkdir -p ../android/app/src/main/jniLibs/x86_64
          cp target/x86_64-linux-android/release/libnewapp_backend.so ../android/app/src/main/jniLibs/x86_64/

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v5
        with:
          name: apks
          path: |
            build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: |
            build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
